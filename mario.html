<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Super Mini Mario — 10 Levels</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    background: #5c94fc;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: monospace, sans-serif;
    color: #fff;
  }
  h1 { margin: 6px; letter-spacing: 2px; text-shadow: 2px 2px #000; font-size: 22px; }
  #info { margin-bottom: 8px; font-size: 12px; opacity: .9; text-align: center; line-height: 1.5; }
  canvas {
    background: #5c94fc;
    border: 4px solid #000;
    image-rendering: pixelated;
  }
</style>
</head>
<body>
  <h1>SUPER MINI MARIO — 10 LEVELS</h1>
  <div id="info">
    ← → move &nbsp;|&nbsp; ↑ / Space = jump (press again in air to <b>double jump</b>) &nbsp;|&nbsp; R restart<br>
    Bonk <b>?</b> boxes from below for coins / size / speed / a monster. Stomp brown monsters once,
    <b>green armored ones twice</b>. Dodge <b>spikes</b> &amp; <b>saws</b>. Reach the castle.
  </div>
  <canvas id="game" width="800" height="400"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

// ---- Physics constants ----
const GRAVITY   = 0.6;
const MOVE      = 0.9;
const FRICTION  = 0.82;
const MAX_SPEED = 5;
const JUMP      = 13;
const groundY   = 360;       // top of the ground
const BOX = 32;              // mystery-box size

// ---- Tiny sound engine (optional, fails silently) ----
let actx;
function audio() {
  if (!actx) { try { actx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { return null; } }
  if (actx.state === 'suspended') actx.resume();
  return actx;
}
function beep(freq, dur, type) {
  const a = audio(); if (!a) return;
  const o = a.createOscillator(), g = a.createGain();
  o.type = type || 'square'; o.frequency.value = freq;
  o.connect(g); g.connect(a.destination);
  g.gain.setValueAtTime(0.07, a.currentTime);
  g.gain.exponentialRampToValueAtTime(0.0001, a.currentTime + dur);
  o.start(); o.stop(a.currentTime + dur);
}
// play a sequence of [freq, dur] notes back-to-back
function tune(notes, type) {
  const a = audio(); if (!a) return;
  let t = a.currentTime;
  for (const [f, d] of notes) {
    const o = a.createOscillator(), g = a.createGain();
    o.type = type || 'square'; o.frequency.value = f;
    o.connect(g); g.connect(a.destination);
    g.gain.setValueAtTime(0.07, t);
    g.gain.exponentialRampToValueAtTime(0.0001, t + d);
    o.start(t); o.stop(t + d);
    t += d * 0.95;
  }
}
// named effects
const SFX = {
  jump:    () => beep(440, 0.09),
  djump:   () => beep(680, 0.09),
  coin:    () => tune([[988, 0.05], [1319, 0.10]]),
  stomp:   () => tune([[330, 0.06], [150, 0.12]], 'square'),   // killing a monster
  hurtMon: () => beep(420, 0.08, 'square'),                    // wounding the tough monster
  box:     () => beep(523, 0.08),
  power:   () => tune([[523, 0.07], [784, 0.07], [1047, 0.12]]),
  grow:    () => tune([[392, 0.07], [659, 0.07], [880, 0.12]]),
  hurt:    () => beep(160, 0.25, 'sawtooth'),
  monster: () => beep(150, 0.18, 'sawtooth'),
  castleOut: () => tune([[392, 0.10], [523, 0.10], [659, 0.16]]),         // coming out of castle
  castleIn:  () => tune([[523, 0.12], [659, 0.12], [784, 0.12], [1047, 0.30]]), // coming in to castle
};

// ---- Helpers ----
function coinRow(x, y, n, gap) { gap = gap || 40; const a = []; for (let i = 0; i < n; i++) a.push({ x: x + i * gap, y }); return a; }
function en(x, range, speed)    { return { x, minX: x - range, maxX: x + range, speed, dir: -1, type: 'goomba', hp: 1 }; }
function tough(x, range, speed) { return { x, minX: x - range, maxX: x + range, speed, dir: -1, type: 'tough', hp: 2 }; }
function spike(x, n)            { return { x, y: groundY - 16, w: n * 16 }; }            // ground spikes, n teeth
function sawH(x, y, range, speed){ return { x, y, axis: 'h', min: x - range, max: x + range, dir: -1, speed, r: 14, ang: 0 }; }
function sawV(x, y, range, speed){ return { x, y, axis: 'v', min: y - range, max: y + range, dir: 1, speed, r: 14, ang: 0 }; }
function rects(a, b) { return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y; }

// =====================================================================
//  LEVEL DEFINITIONS — simplest (1) to hardest (10)
// =====================================================================
const LEVEL_DATA = [
  // 1 — Sunny Meadow
  {
    name: 'SUNNY MEADOW', worldW: 1400, endX: 1280,
    ground: [{ x: 0, w: 1400 }],
    platforms: [],
    boxes: [{ x: 430, y: 250 }],
    coins: [].concat(coinRow(280, 300, 3), coinRow(560, 300, 4), coinRow(900, 310, 4)),
    enemies: [],
    spikes: [], saws: [],
  },
  // 2 — Green Hills
  {
    name: 'GREEN HILLS', worldW: 1650, endX: 1530,
    ground: [{ x: 0, w: 1650 }],
    platforms: [{ x: 600, y: 268, w: 140, h: 18 }],
    boxes: [{ x: 380, y: 250 }, { x: 760, y: 250 }],
    coins: [].concat(coinRow(280, 300, 3), coinRow(620, 236, 3), coinRow(1000, 310, 5)),
    enemies: [en(1100, 160, 1.0)],
    spikes: [spike(950, 2)], saws: [],
  },
  // 3 — First Gaps
  {
    name: 'FIRST GAPS', worldW: 1900, endX: 1760,
    ground: [{ x: 0, w: 820 }, { x: 980, w: 920 }],
    platforms: [{ x: 520, y: 262, w: 120, h: 18 }, { x: 850, y: 300, w: 90, h: 18 }],
    boxes: [{ x: 300, y: 250 }, { x: 1150, y: 250 }],
    coins: [].concat(coinRow(540, 230, 3), coinRow(840, 268, 2), coinRow(1250, 310, 4)),
    enemies: [en(640, 120, 1.2), en(1350, 180, 1.2)],
    spikes: [spike(700, 2)], saws: [],
  },
  // 4 — Rocky Steps
  {
    name: 'ROCKY STEPS', worldW: 2100, endX: 1960,
    ground: [{ x: 0, w: 700 }, { x: 860, w: 560 }, { x: 1520, w: 580 }],
    platforms: [
      { x: 520, y: 285, w: 90, h: 18 }, { x: 850, y: 300, w: 80, h: 18 },
      { x: 980, y: 255, w: 110, h: 18 }, { x: 1180, y: 210, w: 110, h: 18 },
    ],
    boxes: [{ x: 300, y: 250 }, { x: 1210, y: 130 }],
    coins: [].concat(coinRow(1000, 220, 3), coinRow(1600, 310, 5)),
    enemies: [en(950, 100, 1.3), en(1750, 180, 1.3)],
    spikes: [spike(420, 2)], saws: [],
  },
  // 5 — Coin Canyon
  {
    name: 'COIN CANYON', worldW: 2300, endX: 2160,
    ground: [{ x: 0, w: 600 }, { x: 1040, w: 520 }, { x: 1760, w: 540 }],
    platforms: [
      { x: 640, y: 300, w: 90, h: 18 }, { x: 800, y: 270, w: 90, h: 18 },
      { x: 960, y: 300, w: 90, h: 18 }, { x: 1620, y: 300, w: 100, h: 18 },
    ],
    boxes: [{ x: 300, y: 250 }, { x: 1850, y: 250 }],
    coins: [].concat(coinRow(650, 260, 3), coinRow(810, 230, 3), coinRow(970, 260, 3), coinRow(1630, 260, 3)),
    enemies: [en(300, 120, 1.2), en(1900, 160, 1.3), en(2050, 120, 1.3)],
    spikes: [], saws: [sawH(900, 240, 110, 2.2)],
  },
  // 6 — Goomba Gauntlet (first tough monster appears)
  {
    name: 'GOOMBA GAUNTLET', worldW: 2500, endX: 2360,
    ground: [{ x: 0, w: 1300 }, { x: 1460, w: 1040 }],
    platforms: [{ x: 600, y: 265, w: 120, h: 18 }, { x: 1340, y: 300, w: 100, h: 18 }],
    boxes: [{ x: 400, y: 250 }, { x: 900, y: 250 }],
    coins: [].concat(coinRow(620, 233, 3), coinRow(1700, 310, 5)),
    enemies: [en(300, 120, 1.3), en(620, 150, 1.4), tough(1100, 140, 1.1), en(1750, 200, 1.5)],
    spikes: [spike(500, 2), spike(1000, 3)], saws: [],
  },
  // 7 — Sky Platforms
  {
    name: 'SKY PLATFORMS', worldW: 2700, endX: 2560,
    ground: [
      { x: 0, w: 420 }, { x: 560, w: 130 }, { x: 790, w: 130 },
      { x: 1020, w: 130 }, { x: 1270, w: 150 }, { x: 1520, w: 150 }, { x: 1770, w: 930 },
    ],
    platforms: [{ x: 650, y: 240, w: 80, h: 18 }, { x: 1080, y: 230, w: 80, h: 18 }],
    boxes: [{ x: 300, y: 250 }, { x: 1310, y: 240 }],
    coins: [].concat(coinRow(580, 320, 2), coinRow(660, 205, 2), coinRow(1090, 195, 2), coinRow(2000, 310, 5)),
    enemies: [en(250, 100, 1.3), en(1330, 55, 1.0), en(2050, 200, 1.5)],
    spikes: [spike(2150, 2)], saws: [sawV(955, 290, 70, 2.0)],
  },
  // 8 — Pit Peril
  {
    name: 'PIT PERIL', worldW: 2900, endX: 2740,
    ground: [
      { x: 0, w: 400 }, { x: 620, w: 120 }, { x: 900, w: 120 },
      { x: 1200, w: 140 }, { x: 1560, w: 140 }, { x: 1900, w: 1000 },
    ],
    platforms: [{ x: 500, y: 230, w: 80, h: 18 }, { x: 1380, y: 220, w: 90, h: 18 }],
    boxes: [{ x: 250, y: 250 }, { x: 1980, y: 250 }],
    coins: [].concat(coinRow(510, 195, 2), coinRow(1390, 185, 2), coinRow(2200, 310, 6)),
    enemies: [en(960, 45, 1.0), tough(2250, 200, 1.3), en(2500, 150, 1.6)],
    spikes: [spike(2050, 3), spike(2350, 2)], saws: [sawH(1050, 300, 120, 2.5)],
  },
  // 9 — Double Trouble
  {
    name: 'DOUBLE TROUBLE', worldW: 3100, endX: 2960,
    ground: [
      { x: 0, w: 520 }, { x: 740, w: 140 }, { x: 1040, w: 140 },
      { x: 1380, w: 160 }, { x: 1720, w: 160 }, { x: 2060, w: 1040 },
    ],
    platforms: [{ x: 600, y: 210, w: 80, h: 18 }, { x: 1100, y: 200, w: 90, h: 18 }, { x: 1600, y: 200, w: 80, h: 18 }],
    boxes: [{ x: 300, y: 250 }, { x: 1120, y: 110 }, { x: 2250, y: 250 }],
    coins: [].concat(coinRow(610, 175, 2), coinRow(1610, 165, 2), coinRow(2300, 310, 5)),
    enemies: [en(300, 120, 1.4), tough(2300, 180, 1.4), tough(2750, 150, 1.4)],
    spikes: [spike(2150, 2), spike(2520, 3)], saws: [sawV(960, 300, 70, 2.2), sawH(1250, 300, 130, 2.5)],
  },
  // 10 — Castle Doom
  {
    name: 'CASTLE DOOM', worldW: 3500, endX: 3360,
    ground: [
      { x: 0, w: 480 }, { x: 700, w: 130 }, { x: 980, w: 130 }, { x: 1300, w: 150 },
      { x: 1640, w: 150 }, { x: 1980, w: 160 }, { x: 2320, w: 1180 },
    ],
    platforms: [
      { x: 560, y: 210, w: 80, h: 18 }, { x: 1150, y: 200, w: 80, h: 18 },
      { x: 1700, y: 200, w: 80, h: 18 }, { x: 2050, y: 180, w: 80, h: 18 },
    ],
    boxes: [{ x: 250, y: 250 }, { x: 1160, y: 110 }, { x: 2450, y: 250 }, { x: 2600, y: 200 }],
    coins: [].concat(coinRow(570, 175, 2), coinRow(1160, 165, 2), coinRow(2700, 310, 6)),
    enemies: [en(250, 120, 1.5), tough(1360, 60, 1.2), tough(2620, 180, 1.4), en(2820, 160, 1.8), tough(3020, 180, 1.5)],
    spikes: [spike(2400, 2), spike(2900, 3), spike(3150, 2)],
    saws: [sawV(840, 300, 70, 2.4), sawH(1050, 300, 120, 2.6), sawH(2520, 330, 150, 2.6)],
  },
];

const NUM_LEVELS = LEVEL_DATA.length;
const START_CASTLE_X = 10;
const REWARDS = ['coins', 'coins', 'grow', 'speed', 'monster'];

// ---- Game state ----
let level, player, camX, score, lives, state, banner;
let platforms, ground, boxes, coins, enemies, popCoins, signs, spikes, saws;
let endCastle;

function loadLevel(n) {
  level = n;
  const d = LEVEL_DATA[n];
  ground    = d.ground.map(g => ({ x: g.x, y: groundY, w: g.w, h: 60 }));
  platforms = d.platforms.map(p => ({ ...p }));
  boxes     = d.boxes.map(b => ({ x: b.x, y: b.y, w: BOX, h: BOX, active: true, bump: 0 }));
  coins     = d.coins.map(c => ({ ...c, taken: false }));
  enemies   = d.enemies.map(e => ({
    x: e.x, y: groundY - (e.type === 'tough' ? 26 : 22), w: e.type === 'tough' ? 30 : 26,
    h: e.type === 'tough' ? 26 : 22, dir: e.dir, speed: e.speed, baseSpeed: e.speed,
    minX: e.minX, maxX: e.maxX, vy: 0, alive: true, falling: false, type: e.type, hp: e.hp, hurt: false,
  }));
  spikes    = (d.spikes || []).map(s => ({ ...s }));
  saws      = (d.saws || []).map(s => ({ ...s }));
  popCoins  = [];
  signs     = [];
  endCastle = { x: d.endX, doorCx: d.endX + 48, door: { x: d.endX + 33, y: groundY - 46, w: 30, h: 46 } };

  player = {
    x: START_CASTLE_X + 110, y: groundY - 32, w: 26, h: 32,
    vx: 0, vy: 0, onGround: false, face: 1,
    jumps: 0, big: false, speedMul: 1, iframes: 0, alpha: 1,
  };
  camX = 0;
  state = 'start';
  banner = 'LEVEL ' + (n + 1) + ' — ' + d.name;
}

function startGame() { score = 0; lives = 3; loadLevel(0); }

// ---- Player size changes ----
function growPlayer() {
  if (!player.big) { player.big = true; player.y -= 12; player.h = 44; player.w = 30; }
  else { score += 300; }
}
function shrinkPlayer() {
  player.big = false; player.y += 12; player.h = 32; player.w = 26; player.iframes = 90; player.vy = -6;
}
function damagePlayer() {
  if (player.iframes > 0) return;
  if (player.big) { shrinkPlayer(); SFX.hurt(); }
  else loseLife();
}

// ---- Floating reward sign ----
function spawnSign(x, y, text, color) {
  signs.push({ x, y, text, color, life: 75, max: 75 });
}

// ---- Mystery box reward ----
function triggerBox(box) {
  box.active = false;
  box.bump = 8;
  const r = REWARDS[(Math.random() * REWARDS.length) | 0];
  const cx = box.x + BOX / 2, top = box.y;
  if (r === 'coins') {
    for (let i = 0; i < 4; i++) {
      popCoins.push({ x: box.x + 6 + i * 6, y: top - 6, vy: -5 - Math.random() * 2, vx: (i - 1.5) * 0.6, life: 45, max: 45 });
    }
    score += 400; SFX.coin();
    spawnSign(cx, top, '+400', '#ffd700');
  } else if (r === 'grow') {
    growPlayer(); SFX.grow();
    spawnSign(cx, top, '⬆ BIG', '#7CFC00');
  } else if (r === 'speed') {
    player.speedMul = 1.7; SFX.power();
    spawnSign(cx, top, '⚡ FAST', '#ffe34d');
  } else if (r === 'monster') {
    enemies.push({
      x: box.x - 1, y: box.y - 24, w: 26, h: 22, dir: -1, speed: 1.4, baseSpeed: 1.4,
      minX: box.x - 90, maxX: box.x + 90, vy: -3, alive: true, falling: true, type: 'goomba', hp: 1, hurt: false,
    });
    SFX.monster();
    spawnSign(cx, top, '! MONSTER', '#ff5252');
  }
}

// ---- Input ----
const keys = {};
addEventListener('keydown', e => {
  if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Space'].includes(e.code)) e.preventDefault();
  keys[e.code] = true;
  if (!e.repeat && (e.code === 'ArrowUp' || e.code === 'Space' || e.code === 'KeyW')) tryJump();
  if (e.code === 'Enter') {
    if (state === 'start') { state = 'play'; SFX.castleOut(); }   // coming out of the castle
    else if (state === 'complete') nextLevel();
    else if (state === 'dead') respawn();
    else if (state === 'gameover' || state === 'win') startGame();
  }
  if (e.code === 'KeyR') startGame();
});
addEventListener('keyup', e => { keys[e.code] = false; });

function tryJump() {
  if (state !== 'play') return;
  if (player.onGround) { player.vy = -JUMP; player.onGround = false; player.jumps = 1; SFX.jump(); }
  else if (player.jumps < 2) { player.vy = -JUMP * 0.92; player.jumps = 2; SFX.djump(); }
}

function nextLevel() { if (level + 1 >= NUM_LEVELS) state = 'win'; else loadLevel(level + 1); }
function respawn() { loadLevel(level); state = 'play'; SFX.castleOut(); }
function loseLife() { lives--; SFX.hurt(); state = lives <= 0 ? 'gameover' : 'dead'; }

// ---- Update ----
function update() {
  if (state === 'play') {
    handleInput(); physics(); enemiesUpdate(); sawsUpdate(); spikesCheck(); coinsUpdate(); checkCastle();
  } else if (state === 'entering') {
    enteringAnim();
  }
  popCoinsUpdate(); signsUpdate();
  if (player) camX = Math.max(0, Math.min(player.x - W / 2 + player.w / 2, LEVEL_DATA[level].worldW - W));
}

function handleInput() {
  const mv = MOVE * player.speedMul, mx = MAX_SPEED * player.speedMul;
  if (keys['ArrowLeft'] || keys['KeyA']) { player.vx -= mv; player.face = -1; }
  if (keys['ArrowRight'] || keys['KeyD']) { player.vx += mv; player.face = 1; }
  player.vx *= FRICTION;
  player.vx = Math.max(-mx, Math.min(mx, player.vx));
}

function physics() {
  if (player.iframes > 0) player.iframes--;
  player.vy = Math.min(player.vy + GRAVITY, 16);

  player.x += player.vx;
  for (const s of ground.concat(platforms, boxes)) {
    if (rects(player, s)) {
      if (player.vx > 0) player.x = s.x - player.w;
      else if (player.vx < 0) player.x = s.x + s.w;
      player.vx = 0;
    }
  }
  if (player.x < 0) player.x = 0;
  const ww = LEVEL_DATA[level].worldW;
  if (player.x + player.w > ww) player.x = ww - player.w;

  player.y += player.vy;
  player.onGround = false;
  for (const s of ground.concat(platforms)) {
    if (rects(player, s)) {
      if (player.vy > 0) { player.y = s.y - player.h; player.onGround = true; }
      else if (player.vy < 0) player.y = s.y + s.h;
      player.vy = 0;
    }
  }
  for (const b of boxes) {
    if (rects(player, b)) {
      if (player.vy > 0) { player.y = b.y - player.h; player.onGround = true; player.vy = 0; }
      else if (player.vy < 0) { player.y = b.y + b.h; player.vy = 0; if (b.active) { triggerBox(b); SFX.box(); } }
    }
  }
  if (player.onGround) player.jumps = 0;

  if (player.y > H + 60) loseLife();
}

function enemiesUpdate() {
  for (const e of enemies) {
    if (!e.alive) continue;
    e.x += e.dir * e.speed;
    if (e.x < e.minX) { e.x = e.minX; e.dir = 1; }
    if (e.x > e.maxX) { e.x = e.maxX; e.dir = -1; }
    e.vy = Math.min(e.vy + GRAVITY, 14);
    e.y += e.vy;
    for (const s of ground.concat(platforms, boxes)) {
      if (rects(e, s) && e.vy >= 0) { e.y = s.y - e.h; e.vy = 0; e.falling = false; }
    }
    if (e.y > H + 60) { e.alive = false; continue; }

    if (player.iframes <= 0 && rects(player, e)) {
      const pBottom = player.y + player.h;
      if (player.vy > 0 && pBottom - e.y < 18) {
        e.hp--;
        if (e.hp <= 0) {
          e.alive = false; player.vy = -JUMP * 0.6;
          score += e.type === 'tough' ? 400 : 200; SFX.stomp();
        } else {
          // tough monster wounded — bounce, change look, speed up
          player.vy = -JUMP * 0.55; e.hurt = true; e.speed = e.baseSpeed * 1.5;
          e.h = 20; e.y += (e.type === 'tough' ? 6 : 0); SFX.hurtMon();
        }
      } else {
        damagePlayer();
      }
    }
  }
}

function sawsUpdate() {
  for (const s of saws) {
    s.ang += 0.25;
    if (s.axis === 'h') {
      s.x += s.dir * s.speed;
      if (s.x < s.min) { s.x = s.min; s.dir = 1; }
      if (s.x > s.max) { s.x = s.max; s.dir = -1; }
    } else {
      s.y += s.dir * s.speed;
      if (s.y < s.min) { s.y = s.min; s.dir = 1; }
      if (s.y > s.max) { s.y = s.max; s.dir = -1; }
    }
    const box = { x: s.x - s.r + 3, y: s.y - s.r + 3, w: s.r * 2 - 6, h: s.r * 2 - 6 };
    if (player.iframes <= 0 && rects(player, box)) damagePlayer();
  }
}

function spikesCheck() {
  for (const s of spikes) {
    if (player.iframes <= 0 && rects(player, { x: s.x, y: s.y, w: s.w, h: 16 })) damagePlayer();
  }
}

function coinsUpdate() {
  for (const c of coins) {
    if (c.taken) continue;
    if (rects(player, { x: c.x - 8, y: c.y - 8, w: 16, h: 16 })) { c.taken = true; score += 100; SFX.coin(); }
  }
}

function popCoinsUpdate() {
  for (const p of popCoins) { p.x += p.vx; p.y += p.vy; p.vy += 0.3; p.life--; }
  for (let i = popCoins.length - 1; i >= 0; i--) if (popCoins[i].life <= 0) popCoins.splice(i, 1);
  for (const b of boxes) if (b.bump > 0) b.bump--;
}

function signsUpdate() {
  for (const s of signs) { s.y -= 0.8; s.life--; }
  for (let i = signs.length - 1; i >= 0; i--) if (signs[i].life <= 0) signs.splice(i, 1);
}

function checkCastle() {
  if (player.onGround && rects(player, endCastle.door)) { state = 'entering'; SFX.castleIn(); }
}

function enteringAnim() {
  player.vy = Math.min(player.vy + GRAVITY, 16);
  player.y += player.vy;
  for (const s of ground) if (rects(player, s) && player.vy > 0) { player.y = s.y - player.h; player.vy = 0; }
  player.face = 1;
  const cx = player.x + player.w / 2;
  if (cx < endCastle.doorCx) player.x += 2;
  else { player.alpha -= 0.05; if (player.alpha <= 0) state = 'complete'; }
}

// =====================================================================
//  RENDERING
// =====================================================================
function draw() {
  ctx.clearRect(0, 0, W, H);
  drawSky();
  ctx.save();
  ctx.translate(-camX, 0);
  drawGround();
  for (const p of platforms) drawPlatform(p);
  drawCastle(START_CASTLE_X, false);
  drawCastle(endCastle.x, true);
  for (const b of boxes) drawBox(b);
  for (const s of spikes) drawSpikes(s);
  for (const c of coins) if (!c.taken) drawCoin(c.x, c.y);
  for (const p of popCoins) drawPopCoin(p);
  for (const e of enemies) if (e.alive) drawEnemy(e);
  for (const s of saws) drawSaw(s);
  drawPlayer();
  for (const s of signs) drawSign(s);
  ctx.restore();
  drawHUD();
  drawOverlay();
}

function drawSky() {
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#6ba6ff'); g.addColorStop(1, '#9fd0ff');
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#3aa63a';
  for (let i = 0; i < 6; i++) {
    const hx = (i * 320 - camX * 0.35) % (W + 320) - 160;
    ctx.beginPath(); ctx.arc(hx, H - 40, 110, Math.PI, 0); ctx.fill();
  }
  ctx.fillStyle = '#fff';
  for (let i = 0; i < 7; i++) {
    const cx = ((i * 360 - camX * 0.5) % (W + 360) + W + 360) % (W + 360) - 180;
    cloud(cx, 60 + (i % 3) * 36);
  }
}
function cloud(x, y) {
  ctx.beginPath();
  ctx.arc(x, y, 16, 0, 7); ctx.arc(x + 20, y + 4, 20, 0, 7); ctx.arc(x + 44, y, 16, 0, 7);
  ctx.fill();
}

function drawGround() {
  for (const g of ground) {
    ctx.fillStyle = '#8b5a2b'; ctx.fillRect(g.x, g.y, g.w, g.h);
    ctx.fillStyle = '#3aa63a'; ctx.fillRect(g.x, g.y, g.w, 10);
    ctx.fillStyle = '#2e7d2e';
    for (let bx = g.x; bx < g.x + g.w; bx += 32) ctx.fillRect(bx, g.y + 10, 2, g.h - 10);
  }
}

function drawPlatform(p) {
  ctx.fillStyle = '#c84c0c'; ctx.fillRect(p.x, p.y, p.w, p.h);
  ctx.fillStyle = '#e07a3a'; ctx.fillRect(p.x, p.y, p.w, 5);
}

function drawBox(b) {
  const y = b.y - (b.bump || 0);
  if (b.active) {
    ctx.fillStyle = '#c47800'; ctx.fillRect(b.x, y, b.w, b.h);
    ctx.fillStyle = '#ffc94d'; ctx.fillRect(b.x + 3, y + 3, b.w - 6, b.h - 6);
    ctx.fillStyle = '#7a4a00';
    const r = 2;
    ctx.fillRect(b.x + 4, y + 4, r, r); ctx.fillRect(b.x + b.w - 6, y + 4, r, r);
    ctx.fillRect(b.x + 4, y + b.h - 6, r, r); ctx.fillRect(b.x + b.w - 6, y + b.h - 6, r, r);
    ctx.fillStyle = '#7a4a00';
    ctx.font = 'bold 22px monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('?', b.x + b.w / 2, y + b.h / 2 + 1);
    ctx.textBaseline = 'alphabetic';
  } else {
    ctx.fillStyle = '#7a5230'; ctx.fillRect(b.x, y, b.w, b.h);
    ctx.fillStyle = '#5e3f24'; ctx.fillRect(b.x + 3, y + 3, b.w - 6, b.h - 6);
  }
}

function drawSpikes(s) {
  ctx.fillStyle = '#cfd6dd';
  for (let x = s.x; x < s.x + s.w; x += 16) {
    ctx.beginPath();
    ctx.moveTo(x, s.y + 16); ctx.lineTo(x + 8, s.y); ctx.lineTo(x + 16, s.y + 16);
    ctx.closePath(); ctx.fill();
  }
  ctx.fillStyle = '#8b97a3'; ctx.fillRect(s.x, s.y + 14, s.w, 3);
}

function drawSaw(s) {
  ctx.save();
  ctx.translate(s.x, s.y); ctx.rotate(s.ang);
  ctx.fillStyle = '#9aa3ad';
  ctx.beginPath();
  for (let i = 0; i < 12; i++) {
    const a = (i / 12) * Math.PI * 2;
    const rr = i % 2 === 0 ? s.r : s.r - 5;
    ctx.lineTo(Math.cos(a) * rr, Math.sin(a) * rr);
  }
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#5c6670'; ctx.beginPath(); ctx.arc(0, 0, 5, 0, 7); ctx.fill();
  ctx.restore();
}

function drawCoin(x, y) {
  ctx.fillStyle = '#ffd700';
  ctx.beginPath(); ctx.arc(x, y, 8, 0, 7); ctx.fill();
  ctx.strokeStyle = '#b8860b'; ctx.lineWidth = 1; ctx.stroke();
  ctx.fillStyle = '#fff6c0'; ctx.fillRect(x - 2, y - 4, 2, 8);
}
function drawPopCoin(p) { ctx.globalAlpha = Math.max(0, p.life / p.max); drawCoin(p.x, p.y); ctx.globalAlpha = 1; }

function drawSign(s) {
  ctx.globalAlpha = Math.max(0, Math.min(1, s.life / s.max));
  ctx.font = 'bold 13px monospace'; ctx.textAlign = 'center';
  const w = ctx.measureText(s.text).width + 14;
  ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.fillRect(s.x - w / 2, s.y - 18, w, 18);
  ctx.fillStyle = s.color; ctx.fillRect(s.x - w / 2, s.y - 18, w, 2);
  ctx.fillStyle = s.color; ctx.fillText(s.text, s.x, s.y - 5);
  ctx.globalAlpha = 1; ctx.textAlign = 'left';
}

function drawEnemy(e) {
  if (e.type === 'tough') {
    // armored shell creature — green, distinct from brown goomba
    const body = e.hurt ? '#e07a2a' : '#2bb673';
    const shell = e.hurt ? '#a8531a' : '#15814f';
    ctx.fillStyle = shell; ctx.fillRect(e.x, e.y, e.w, e.h);
    ctx.fillStyle = body; ctx.fillRect(e.x + 3, e.y + 4, e.w - 6, e.h - 7);
    // shell ridges
    ctx.fillStyle = shell;
    ctx.fillRect(e.x + 8, e.y + 2, 2, e.h - 4); ctx.fillRect(e.x + e.w - 10, e.y + 2, 2, e.h - 4);
    ctx.fillStyle = '#fff';
    ctx.fillRect(e.x + 5, e.y + 6, 5, 5); ctx.fillRect(e.x + e.w - 10, e.y + 6, 5, 5);
    ctx.fillStyle = '#000';
    ctx.fillRect(e.x + 6, e.y + 8, 2, 2); ctx.fillRect(e.x + e.w - 9, e.y + 8, 2, 2);
    if (e.hurt) { ctx.fillStyle = '#fff'; ctx.fillRect(e.x + e.w / 2 - 1, e.y + 1, 2, 5); } // crack
  } else {
    ctx.fillStyle = e.falling ? '#9b4dca' : '#7a3b1a';
    ctx.fillRect(e.x, e.y, e.w, e.h);
    ctx.fillStyle = '#5a2a12'; ctx.fillRect(e.x, e.y + e.h - 5, e.w, 5);
    ctx.fillStyle = '#fff';
    ctx.fillRect(e.x + 5, e.y + 6, 5, 5); ctx.fillRect(e.x + e.w - 10, e.y + 6, 5, 5);
    ctx.fillStyle = '#000';
    ctx.fillRect(e.x + 7, e.y + 8, 2, 2); ctx.fillRect(e.x + e.w - 8, e.y + 8, 2, 2);
  }
}

function drawCastle(x, withFlag) {
  const top = groundY - 104, w = 96, h = 104;
  ctx.fillStyle = '#b9b9c4'; ctx.fillRect(x, top, w, h);
  ctx.fillStyle = '#9a9aa6';
  for (let by = top + 14; by < groundY; by += 16) ctx.fillRect(x, by, w, 2);
  for (let bx = x; bx < x + w; bx += 24) ctx.fillRect(bx, top, 2, h);
  ctx.fillStyle = '#b9b9c4';
  for (let bx = x; bx < x + w; bx += 24) ctx.fillRect(bx, top - 12, 14, 12);
  ctx.fillStyle = '#3a2410';
  ctx.fillRect(x + 33, groundY - 46, 30, 46);
  ctx.beginPath(); ctx.arc(x + 48, groundY - 46, 15, Math.PI, 0); ctx.fill();
  if (withFlag) {
    ctx.fillStyle = '#fff'; ctx.fillRect(x + 46, top - 46, 3, 36);
    ctx.fillStyle = '#e53935';
    ctx.beginPath(); ctx.moveTo(x + 49, top - 46); ctx.lineTo(x + 80, top - 36); ctx.lineTo(x + 49, top - 26); ctx.fill();
  }
}

function drawPlayer() {
  if (!player) return;
  if (player.iframes > 0 && (player.iframes >> 2) % 2 === 0) return;
  ctx.globalAlpha = player.alpha;
  const px = player.x, py = player.y, w = player.w, h = player.h;
  const hat = Math.max(8, h * 0.28), face = h * 0.22;
  ctx.fillStyle = '#e53935'; ctx.fillRect(px, py, w, hat);
  ctx.fillStyle = '#ffccaa'; ctx.fillRect(px + 4, py + hat, w - 8, face);
  ctx.fillStyle = '#1565c0'; ctx.fillRect(px, py + hat + face, w, h - hat - face);
  ctx.fillStyle = '#000';
  const eyeX = player.face === 1 ? px + w - 9 : px + 5;
  ctx.fillRect(eyeX, py + hat + 3, 3, 3);
  ctx.globalAlpha = 1;
}

function drawHUD() {
  ctx.fillStyle = '#fff'; ctx.font = 'bold 18px monospace'; ctx.textAlign = 'left';
  ctx.fillText('SCORE ' + score, 14, 26);
  ctx.fillText('LEVEL ' + (level + 1) + '/' + NUM_LEVELS, 250, 26);
  ctx.textAlign = 'right';
  ctx.fillText('LIVES ' + '♥'.repeat(Math.max(0, lives)), W - 14, 26);
  ctx.textAlign = 'left';
  if (player && player.speedMul > 1) {
    ctx.fillStyle = '#ffe34d'; ctx.font = 'bold 14px monospace';
    ctx.fillText('⚡ SPEED', 14, 46);
  }
}

function drawOverlay() {
  if (state === 'play' || state === 'entering') return;
  ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center'; ctx.fillStyle = '#fff';
  let title = '', sub = 'Press Enter';
  if (state === 'start')        { title = banner; sub = 'Press Enter to leave the castle →'; }
  else if (state === 'complete'){ title = 'LEVEL ' + (level + 1) + ' COMPLETE!'; sub = 'Press Enter for the next level →'; }
  else if (state === 'dead')    { title = 'YOU DIED'; sub = 'Press Enter to try this level again (' + lives + ' left)'; }
  else if (state === 'gameover'){ title = 'GAME OVER'; sub = 'Press Enter to start from Level 1'; }
  else if (state === 'win')     { title = '🏆 YOU BEAT ALL 10 LEVELS! 🏆'; sub = 'Final score ' + score + ' — Press Enter to play again'; }
  ctx.font = 'bold 28px monospace';
  ctx.shadowColor = '#000'; ctx.shadowOffsetX = 2; ctx.shadowOffsetY = 2;
  ctx.fillText(title, W / 2, H / 2 - 8);
  ctx.shadowOffsetX = 0; ctx.shadowOffsetY = 0;
  ctx.font = '15px monospace'; ctx.fillStyle = '#ffe34d';
  ctx.fillText(sub, W / 2, H / 2 + 26);
  ctx.textAlign = 'left';
}

function loop() { update(); draw(); requestAnimationFrame(loop); }

startGame();
loop();
</script>
